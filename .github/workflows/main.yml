name: Daily Market Wrap

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  market-wrap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate market wrap output
        run: python run_daily_market_wrap.py

      - name: Preview email body
        run: python send_market_wrap_email.py --print-only

      - name: Send email
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_market_wrap_email.py

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-market-wrap-output
          path: output/
